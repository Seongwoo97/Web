<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>회원 가입 신청서</title>
    </head>
    <body>
        <div id="container">
            <h1>회원 가입을 환영합니다</h1>
            <form action="./result2.php" method="post">
                <fieldset>
                    <legend>사용자 정보</legend>
                    <ul>
                        <li>
                            <label for="uid">아이디</label>
                            <input type="text" id="uid" name="user_id" autofocus placeholder="4자 ~ 10자 사이, 공백 없이" required >
                        </li>

                        <li>
                            <label for="umail">이메일</label>
                            <input type="email" id="umail" name="user_email" required>
                        </li>

                        <li>
                            <label for="upass1">비밀번호</label>
                            <input type="password" id="upass1" name="user_pw" required placeholder="문자와 숫자, 특수 기호 포함">
                        </li>

                         <li>
                            <label for="upass2">비밀번호 확인</label>
                            <input type="password" id="upass2" name="user_pw2" required>
                        </li>

                        <li>
                            <label for="path">가입 경로</label>
                            <select id="fath" name="how">
                                <option value="블로그">블로그</option>
                                <option value="SNS">SNS</option>
                                <option value="검색">검색</option>
                                <option value="기타">기타</option>
                            </select>
                        </li>
                        <br>
                        <li>
                            <label for="memo">메모</label>
                            <textarea cols="40" rows="5" name="say" placeholder="남길 말씀이 있다면 여기에 작성해 주세요"></textarea>
                        </li>

                    </ul>


                </fieldset>

                <fieldset>
                    <legend>이벤트와 새로운 소식</legend>
                    <input type="radio" name="mailing" id="mailing_y" value="mailing_yes" checked>
                    <label for="mailing_y">메일 수신</label>
                    <input type="radio" name="mailing" id="mailing_n" value="mailing_no">
                    <label for="mailing_n">메일 수신 안 함</label>
                </fieldset>

                <fieldset>
                    <legend>혜택을 선택하세요</legend>
                    <label><input type="checkbox" name="gift[]" value="할인">비용 5% 할인</label>
                    <label><input type="checkbox" name="gift[]" value="선물">기념품 증정</label>
                    <label><input type="checkbox" name="gift[]" value="여행">여행 상품권</label>

                </fieldset>
                <br>
                <div>
                    <input type="submit" value="가입하기" >
                    <input type="reset" value="취소" >
                </div>


            </form>
        </div>


    </body>



</html>
