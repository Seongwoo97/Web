<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>가구 조사</title>

        <style>
            table{border: 1px solid black; border-collapse: collapse; width: 500px;}

            th,td{border: 1px solid black; padding: 5px;}

            th{font-weight: bold;}

            td{text-align: right;}

            td:nth-child(1){font-weight: bold;}
            th:last-child{background-color: #e5f6f6;}
            td:last-child{background-color: #e5f6f6;}
            td:first-child{text-align: center;}



        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>지수</th>
                <th>2019년</th>
                <th>2020년</th>
                <th>2021년</th>
                <th>2022년</th>
            </tr>

            <tr>
                <td>가구 수</td>
                <td>20,890,348</td>
                <td>21,484,785</td>
                <td>22,022,753</td>
                <td>22,383,187</td>
            </tr>

            <tr>
                <td>1인 가구 수</td>
                <td>6,147,516</td>
                <td>6,643,354</td>
                <td>7,165,788</td>
                <td>7,502,350</td>
            </tr>


        </table>

    </body>

</html>
