<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>table test</title>

        <style>
            table{border: 1px solid black; width: 300px;}

            th,td{border: 1px dotted black; padding: 5px; text-align: center;}

        </style>

    </head>

    <body>
        <table>
            <tr>
                <th>용도</th>
                <th>중량</th>
                <th>개수</th>
                <th>가격</th>
            </tr>
            <tr>
                <td rowspan="2">선물용</td>
                <td>3kg</td>
                <td>11~16과</td>
                <td>35,000원</td>
            </tr>
            <tr>
                <td>5kg</td>
                <td>17~26과</td>
                <td>52,000원</td>
            </tr>
               <tr>
                <td rowspan="2">가정용</td>
                <td>3kg</td>
                <td>11~16과</td>
                <td>30,000원</td>
            </tr>
            <tr>
                <td>5kg</td>
                <td>17~26과</td>
                <td>47,000원</td>
            </tr>

        </table>





    </body>
</html>
