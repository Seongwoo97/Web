<!DOCTYPE html>
<html>

    <head>
        <meta charset="utf-8">
        <title>table ex</title>


    </head>

    <body>
        <h2>Table 요소 연습</h2>

        <table border="1">


            <tr>
                <th>번호</th>
                <th>이름</th>
                <th>메세지</th>
            </tr>

            <tr>
                <td>1</td>
                <td>sam</td>
                <td>hello table</td>
            </tr>

            <tr>
                <td>2</td>
                <td>robin</td>
                <td>nice to meet you</td>
                <!-- 각 행(row)의 셀(칸) 개수가 달라도 됨 -->
                <td>bye!</td> 
                <!-- 기존 칸에서 벗어나 삐져나온다 -->
            </tr>

            <!-- 표의 제목을 표시하기 -->
            <caption>1반 목록</caption>
            <!-- 작성 위치와 상과 없이 table 안의 caption은 그냥 맨 위에 위치함 -->
            <!-- css를 통해 위치는 조정 가능 / 나중에 배울 것 -->


        </table>
        
        <br>
        <hr>
        <br>

        <!-- table 칸(셀) 안에 다른 요소를 넣어보기 -->
        <table border="1" width="100%">
            <tr>
                <td width="30%"><a href="https://www.naver.com">네이버로 이동</a></td>
                <td>
                    <ul>
                        <li>aaa</li>
                        <li>bbb</li>
                        <li>ccc</li>      
                    </ul>
                </td>
            </tr>

            <tr>
                <td>
                    <p>테이블 안에 어떤 요소든 넣을 수 있음. 한글이면 자동 줄바꿈이 된다</p>
                    <p>sdkfl jaskldjfklsjfjsdkfjskldajfksldjfsjdkfjksjdfksjdfsjkfjsdasdfasdfsadfk</p>
                    <!-- 영어는 띄어쓰기 하기 전까지는 자동 줄바꿈되지 않음 -->
                </td>
                <td>
                    <img src="./image/paris.jpg" alt="파리의 전경" width="50%">
                </td>

            </tr>

        </table>

        <br>
        <hr>
        <br>


        <table border="1">
            <tr>
                <!-- 다음줄이 없으면 span 은 발동하지 않음 -->
                <td rowspan="2">111</td>
                <td colspan="3">222</td>
                <td>333</td>
            </tr>
            <tr>
                <td>444</td>
                <td>555</td>
                <td>66666666666</td>
            </tr>
            <tr>

            </tr>

        </table>
    </body>
</html>
