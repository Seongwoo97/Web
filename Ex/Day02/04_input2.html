<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>input element2</title>


    </head>

    <body>
        <!-- 여러줄 입력 -->
        <textarea cols="40" row="5"></textarea>
        <hr>

        <!-- 콤보 박스용 요소 -->
        <select>
            <option value="aaa">사과</option>
            <option value="bbb">바나나</option>
            <option value="ccc">오렌지</option>
        </select>

        <!-- 옵션 그룹 활용 -->
        <select>
            <optgroup label="중식">
                <option value="aa">짜장면</option>
                <option value="bb">짬뽕</option>
                <option value="cc">볶음밥</option>
            </optgroup>

            <optgroup label="일식">
                <option value="aa">초밥</option>
                <option value="bb">덮밥</option>
                <option value="cc">회</option>
            </optgroup>
        </select>

        <hr>
        <br>

        <fieldset>
            <legend>필드셋의 제목(개인정보)</legend>
            <label>이름 : <input type="text" name="name">  </label>
            <label>나이 : <input type="text" name="age">  </label>
        </fieldset>

        <hr>

        <!-- 파일 선택하기 -->
        <input type="file" accept="image/png">
        <hr>
        <!-- 여러 개의 파일 선택 -->
        <input type="file" accept="image/*" multiple>

        <hr>

        <!-- 대부분의 input 요소는 form 과 함께 작성함. -->
        <!-- 비교적 최근에 새로 추가된 type들 -->

        <form action="">
            <!-- 날짜 선택 관련 타입들 -->

            <input type="date"> <br>

            <input type="datetime"> <!-- 지원 안 됨 ㅋㅋㅋ.. --> <br>

            <input type="datetime-local"> <!-- 근데 이건 됨 ㅋㅋㅋㅋㅋ.. --> <br>
            <!-- datetime 이라 하면 어느 지역인질 모르니, local 로 디테일 잡는 것 -->

            <input type="month"> <br>

            <input type="week"> <br>

        </form>

        <hr>

        <!-- 색상 선택 창 -->

        <input type="color"> <br>

        <!-- 이메일 입력 박스 [모바일에서 키패드의 모양이 달라짐] -->

        <input type="email"> <br>

        <!-- 전화번호 [모바일에서 키패드의 모양이 달라짐] -->

        <input type="tel"> <br>

        <!-- 검색어 입력박스 [글씨를 쓰면 삭제 버튼이 우측 끝에 표시됨] -->

        <input type="search"> <br>

        <!-- 범위 지정 요소 -->
        <input type="range" min="0" max="10" step="2" value="4"> <br>

        <!-- 숫자 선택 요소 -->
        <input type="number" min="210" max="300" step="10" value="230"> <br>

        <!--  url 입력 타입 [모바일에서 키보드 모양이 다름] -->
        <input type="url"> <br>

        <hr>

        <!-- 비교적 최근에 새로이 추가된 input의 속성들 -->
        <form action="./aaa.php">

            <!-- 힌트 글씨 표시 가능 -->
            <input type="text" placeholder="password"> <br>

            <!-- 반드시 입력해야 하는 요소에 적용하는 속성 (form 요소 안에서만 작동) -->
            <input type="text" required> <br>

            <!-- 글씨는 보이지만 수정 불가 -->
            <input type="text" readonly value="sam"> <br>

            <!-- 페이지가 로딩될 때 가장 먼저 포커스를 받고 싶다면? -->
            <!-- 포커스 = 클릭해서 입력할 수 있는 상태가 되는 것 -->
            <input type="text" autofocus> <br>

            <!-- 최대 입력 글자수 제한 -->
            <input type="text" maxlength="5"> <br>

            <!-- 자동 완성 기능 -->
            <input type="text" autocomplete list="datas">

            <datalist id="datas">
                <option value="canada" label="캐나다"></option>
                <option value="china" label="중국"></option>
                <option value="korea" label="한국"></option>
            </datalist>

            <hr>
            <input type="submit"> <br>

    


        </form>

    </body>
</html>
